<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Avisos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background: #f4f4f4; }
        
        /* ESTILO PARA EL LOGO */
        .logo { 
            display: block; 
            margin: 0 auto 20px auto; 
            max-width: 180px; 
            height: auto; 
        }

        .caja { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .oculto { display: none; }
        #log { margin-top: 15px; font-size: 13px; color: #444; border-top: 1px solid #ccc; padding-top: 10px; }
        
        .grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; margin-bottom: 15px; }
        .badge { background: #28a745; color: white; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .etiqueta { font-size: 14px; font-weight: bold; color: #555; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<!-- LOGOTIPO -->
<img src="logo.gif" alt="Logotipo" class="logo">

<!-- LOGIN -->
<div id="pantalla-login" class="caja">
    <h2>Entrar</h2>
    <input type="number" id="puesto" placeholder="Nº de Puesto (Ej: 1)">
    <input type="password" id="pass" placeholder="Contraseña">
    <button id="btn-entrar">Conectar</button>
</div>

<!-- APLICACIÓN -->
<div id="pantalla-app" class="caja oculto">
    <h2 id="titulo"></h2>
    
    <label class="etiqueta">Conectados ahora:</label>
    <div id="grid-puestos" class="grid"></div>
    
    <label class="etiqueta">Destinatarios del aviso:</label>
    <input type="text" id="destinos" placeholder="Ej: 2, 3 o 2.3">
    <button id="btn-enviar">ENVIAR AVISO</button>
    
    <div id="log"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, push, update, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 1. CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBqZuHzHsbDi_EQpCAbkhSNEaf-AFOuGkg",
      authDomain: "gai-almansa-avisos.firebaseapp.com",
      databaseURL: "https://gai-almansa-avisos-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "gai-almansa-avisos",
      storageBucket: "gai-almansa-avisos.firebasestorage.app",
      messagingSenderId: "779957648536",
      appId: "1:779957648536:web:ea1ed579a5cd060973e4ed"
    };

    const db = getDatabase(initializeApp(firebaseConfig));

    let miPuesto, miPass;
    const $ = (id) => document.getElementById(id);
    const log = (msg) => $('log').innerHTML = `[${new Date().toLocaleTimeString()}] ${msg} <br>` + $('log').innerHTML;

    // Recuperar memoria
    if (localStorage.getItem('ultimo_puesto')) $('puesto').value = localStorage.getItem('ultimo_puesto');
    if (localStorage.getItem('ultimos_destinos')) $('destinos').value = localStorage.getItem('ultimos_destinos');

    // 2. FUNCIÓN ENTRAR
    const entrar = async () => {
        miPuesto = $('puesto').value;
        miPass = $('pass').value;
        if (!miPuesto || !miPass) return alert("Faltan datos");

        sessionStorage.clear();

        try {
            const miRef = ref(db, `conectados/puesto_${miPuesto}`);
            await set(miRef, { online: true, auth: miPass }); 
            onDisconnect(miRef).remove(); 

            push(ref(db, 'log_sesiones'), { puesto: miPuesto, evento: "Conexión", timestamp: serverTimestamp(), auth: miPass });
            onDisconnect(push(ref(db, 'log_sesiones'))).set({ puesto: miPuesto, evento: "Desconexión", timestamp: serverTimestamp(), auth: miPass });

            localStorage.setItem('ultimo_puesto', miPuesto);

            $('pantalla-login').classList.add('oculto');
            $('pantalla-app').classList.remove('oculto');
            $('titulo').innerText = `Puesto ${miPuesto}`;
            
            Notification.requestPermission();
            log(`🟢 Has iniciado sesión en el Puesto ${miPuesto}`);
            iniciarEscuchas();
        } catch(e) {
            alert("Error de conexión");
        }
    };

    // 3. ESCUCHAS
    function iniciarEscuchas() {
        onValue(ref(db, 'conectados'), (snap) => {
            let html = "";
            snap.forEach(hijo => {
                const num = hijo.key.replace('puesto_', '');
                html += `<div class="badge">${num}</div>`;
            });
            $('grid-puestos').innerHTML = html || "<span style='font-size:13px;color:#888;'>Solo tú</span>";
        });

        let primeraCarga = true; 
        onValue(ref(db, 'avisos'), (snap) => {
            snap.forEach(hijo => {
                const aviso = hijo.val();
                if (!aviso || !aviso.lista) return;

                if (aviso.estado === 'pendiente' && aviso.lista[aviso.actual] == miPuesto) {
                    if (!sessionStorage.getItem(hijo.key)) {
                        sessionStorage.setItem(hijo.key, 'notificado');
                        log(`🔔 RECIBIDO: Aviso urgente del Puesto ${aviso.emisor}.`);
                        lanzarNotificacion(aviso.emisor, hijo.key);
                    }
                }
            });
            primeraCarga = false; 
        });
    }

    // 4. ENVIAR
    const enviar = () => {
        const dests = $('destinos').value.split(/[.,]/).map(s => s.trim()).filter(Boolean);
        if (!dests.length) return alert("Pon destinatarios");

        localStorage.setItem('ultimos_destinos', $('destinos').value);

        const nuevoAviso = push(ref(db, 'avisos'));
        set(nuevoAviso, { emisor: miPuesto, lista: dests, actual: 0, estado: 'pendiente', timestamp: serverTimestamp(), auth: miPass });
        cascada(nuevoAviso.key, dests, 0);
    };

    // 5. CASCADA
    function cascada(id, lista, indice) {
        log(`📤 Enviando a Puesto ${lista[indice]}...`);
        setTimeout(async () => {
            const snap = await get(ref(db, `avisos/${id}`));
            const aviso = snap.val();
            if (aviso && aviso.estado === 'pendiente' && aviso.actual === indice) {
                if (indice + 1 < lista.length) {
                    update(ref(db, `avisos/${id}`), { actual: indice + 1, auth: miPass });
                    cascada(id, lista, indice + 1);
                } else {
                    update(ref(db, `avisos/${id}`), { estado: 'caducado', auth: miPass });
                    log("❌ FIN: Nadie ha respondido.");
                }
            }
        }, 12000); 
    }

    // 6. NOTIFICACIÓN
    function lanzarNotificacion(emisor, idAviso) {
        const n = new Notification(`AVISO DE PUESTO ${emisor}`, { 
            body: "Haz clic para aceptar",
            requireInteraction: true 
        });
        n.onclick = () => {
            update(ref(db, `avisos/${idAviso}`), { estado: `aceptado_${miPuesto}`, auth: miPass });
            log(`✅ ACEPTADO: Has confirmado el aviso.`);
            n.close();
        };
        setTimeout(() => n.close(), 12000);
    }

    // 7. ASIGNAR EVENTOS (SOLUCIÓN PARA EDGE/FIREFOX)
    $('btn-entrar').addEventListener('click', entrar);
    $('btn-enviar').addEventListener('click', enviar);

</script>

</body>
</html>
